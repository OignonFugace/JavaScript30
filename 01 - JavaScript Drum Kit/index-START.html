    // QUATRIEME SOLUTION
    // Essayons d'utiliser les evènements de transitions.
    function playSound(event) {
        const item = document.querySelector(`.key[data-key="${event.keyCode}"]`);
        const audio = document.querySelector(`audio[data-key="${event.keyCode}"]`);
        if (!audio) return;
        audio.currentTime = 0;
        audio.play();
        item.classList.add('playing');
    }
    
    function clickHanlde() {
        const audio = document.querySelector(`audio[data-key="${this.dataset.key}"]`);
        audio.currentTime = 0;
        audio.play();
        this.classList.add('playing');
    }

    function removeEffect(event) {
        console.log(this);
        event.target.classList.remove('playing');
        // pourquoi est-ce que ça ne fonctionne pas avec "this" ici ? 
        // car au moment de l'appel de la fonction, la classe 'playing' n'est pas encore ajoutée. 
    }

    const items = document.querySelectorAll('.key');

    for (const item of items) {
        item.addEventListener('click', clickHanlde);
        item.addEventListener('transitionend', removeEffect);
    }

    window.addEventListener('keydown', playSound);
    window.addEventListener('keyup', removeEffect);
